<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanZiRong - Personal Website</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Söhne&family=News+Display&display=swap" rel="stylesheet">
    <style>
        /* === Design Tokens === */
        :root {
            /* Warm Paper Palette - Anthropic Inspired */
            --bg-primary: #FAF8F5;
            --bg-secondary: #F5F2ED;
            --bg-tertiary: #EDE9E3;
            --text-primary: #1A1A1A;
            --text-secondary: #5C5C5C;
            --text-tertiary: #8A8A8A;
            --accent-primary: #C4A77D;
            --accent-warm: #D4A574;
            --accent-copper: #B87333;
            --border-color: #E5E0D8;
            --shadow-soft: rgba(0, 0, 0, 0.04);
            --shadow-medium: rgba(0, 0, 0, 0.08);

            /* Typography */
            --font-display: "Cormorant Garamond", "Playfair Display", Georgia, serif;
            --font-body: "Söhne", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --font-mono: "SF Mono", "Fira Code", monospace;

            /* Spacing */
            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 48px;
            --space-xl: 80px;
            --space-2xl: 120px;
        }

        /* === Reset & Base === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ::selection {
            background: var(--accent-primary);
            color: white;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* === Ambient Background Effect === */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 20% 0%, rgba(196, 167, 125, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(212, 165, 116, 0.06) 0%, transparent 50%);
            z-index: -1;
        }

        /* === Container === */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 var(--space-md);
        }

        /* === Navigation === */
        nav {
            padding: var(--space-lg) 0;
            position: relative;
            z-index: 10;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--text-primary);
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 0.7;
        }

        .logo:active {
            opacity: 0.9;
        }

        .nav-links {
            display: flex;
            align-items: baseline;
            gap: var(--space-md);
        }

        .nav-link {
            display: inline-block;
            font-size: 0.85rem;
            line-height: 1.2;
            padding-bottom: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            position: relative;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .nav-link::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent-primary);
            transition: width 0.3s ease;
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link:active {
            opacity: 0.8;
        }

        .nav-link:focus-visible {
            outline: 2px solid var(--accent-copper);
            outline-offset: 2px;
        }

        .lang-toggle:hover::after {
            width: 0;
        }

        /* === Contact Dropdown === */
        .nav-contact-wrap {
            position: relative;
            display: inline-block;
        }

        .nav-contact-wrap .nav-link {
            cursor: pointer;
        }

        .nav-contact-wrap:hover .contact-dropdown,
        .nav-contact-wrap:focus-within .contact-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .contact-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 12px;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-shadow: 0 8px 24px var(--shadow-medium);
            min-width: 220px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: opacity 0.25s ease, visibility 0.25s ease, transform 0.25s ease;
            z-index: 100;
        }

        .contact-dropdown a,
        .contact-dropdown span {
            display: block;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            transition: color 0.2s ease;
        }

        .contact-dropdown a:last-child,
        .contact-dropdown span:last-child {
            border-bottom: none;
        }

        .contact-dropdown a {
            cursor: pointer;
        }

        .contact-dropdown a:hover {
            color: var(--accent-copper);
        }

        .contact-dropdown .contact-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }

        .contact-dropdown .contact-value {
            font-size: 0.92rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* === Hero Section === */
        .hero {
            padding: var(--space-2xl) 0 var(--space-xl);
            position: relative;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(2.8rem, 8vw, 4.2rem);
            font-weight: 400;
            line-height: 1.15;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: var(--space-md);
            animation: fade-up 0.8s ease-out both;
        }

        .hero-title .line {
            display: block;
        }

        .hero-title .line:nth-child(2) {
            animation-delay: 0.15s;
            font-style: italic;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .hero-intro {
            max-width: 560px;
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: var(--space-lg);
            animation: fade-up 0.8s ease-out 0.3s both;
        }

        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            font-size: 0.9rem;
            color: var(--accent-copper);
            text-decoration: none;
            cursor: pointer;
            animation: fade-up 0.8s ease-out 0.45s both;
            transition: gap 0.3s ease, opacity 0.2s ease, transform 0.2s ease;
        }

        .hero-cta:hover {
            gap: 12px;
            opacity: 0.85;
        }

        .hero-cta:active {
            transform: scale(0.98);
        }

        .hero-cta:focus-visible {
            outline: 2px solid var(--accent-copper);
            outline-offset: 4px;
            border-radius: 2px;
        }

        .hero-cta svg {
            width: 16px;
            height: 16px;
        }

        /* === Section Styles === */
        section {
            padding: var(--space-lg) 0;
        }

        .section-header {
            display: flex;
            align-items: baseline;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
            animation: fade-up 0.6s ease-out both;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            color: var(--text-primary);
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-color) 0%, transparent 100%);
        }

        /* === List Items === */
        .item-list {
            display: flex;
            flex-direction: column;
            /* gap removed to let cards handle their own spacing */
        }

        /* === Education Items - Card Style === */
        .education-item {
            display: block;
            padding: var(--space-md);
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: var(--space-sm);
            animation: fade-up 0.5s ease-out both;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .education-item::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-copper);
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.3s ease;
        }

        .education-item:first-child { animation-delay: 0.1s; }
        .education-item:last-child { margin-bottom: 0; }

        .education-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px var(--shadow-medium);
            background: var(--bg-tertiary);
        }

        .education-item:hover::before {
            transform: scaleY(1);
        }

        .edu-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .edu-period {
            font-size: 0.8rem;
            color: var(--accent-copper);
            font-weight: 500;
            font-feature-settings: "tnum";
        }

        .edu-content h3 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .edu-content p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* === Project Items - Card Style (Same as Education) === */
        .project-item {
            display: block;
            padding: var(--space-md);
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: var(--space-sm);
            color: inherit;
            animation: fade-up 0.5s ease-out both;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .project-item::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-copper);
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.3s ease;
        }

        .project-item:last-child { margin-bottom: 0; }

        .project-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px var(--shadow-medium);
            background: var(--bg-tertiary);
        }

        .project-item:hover::before {
            transform: scaleY(1);
        }

        .project-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .project-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .project-link-btn {
            font-size: 0.8rem;
            color: var(--accent-copper);
            text-decoration: none;
            padding: 4px 12px;
            border: 1px solid var(--accent-copper);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .project-link-btn:hover {
            background: var(--accent-copper);
            color: white;
            transform: scale(1.03);
        }

        .project-link-btn:active {
            transform: scale(0.97);
        }

        .project-link-btn:focus-visible {
            outline: 2px solid var(--accent-copper);
            outline-offset: 2px;
        }

        .project-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .project-tag {
            font-size: 0.75rem;
            color: var(--accent-copper);
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .project-item:hover .project-tag {
            background: var(--accent-primary);
            color: white;
        }

        /* === Skills Section - Tag Style === */
        .skills-container {
            animation: fade-up 0.5s ease-out both;
        }

        .skill-category {
            margin-bottom: var(--space-md);
        }

        .skill-category:last-child {
            margin-bottom: 0;
        }

        .skill-category-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            margin-bottom: 12px;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-tag {
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.25s ease;
            cursor: default;
        }

        .skill-tag:hover {
            background: var(--accent-primary);
            color: white;
            transform: scale(1.04);
        }

        .skill-tag:active {
            transform: scale(0.98);
        }

        /* === Experience Items - Card Style === */
        .experience-item {
            display: block;
            padding: var(--space-md);
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: var(--space-sm);
            animation: fade-up 0.5s ease-out both;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .experience-item::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-copper);
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.3s ease;
        }

        .experience-item:first-child { animation-delay: 0.1s; }
        .experience-item:last-child { margin-bottom: 0; }

        .experience-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px var(--shadow-medium);
            background: var(--bg-tertiary);
        }

        .experience-item:hover::before {
            transform: scaleY(1);
        }

        .exp-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .exp-period {
            font-size: 0.8rem;
            color: var(--accent-copper);
            font-weight: 500;
            font-feature-settings: "tnum";
        }

        .exp-content h3 {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .exp-content p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* === Placeholder === */
        .placeholder {
            padding: var(--space-lg);
            background: var(--bg-secondary);
            border-radius: 4px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.9rem;
            font-style: italic;
        }

        /* === Footer === */
        footer {
            padding: var(--space-xl) 0;
            margin-top: var(--space-lg);
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        footer p {
            font-size: 0.85rem;
            color: var(--text-tertiary);
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        footer a:hover {
            color: var(--accent-copper);
        }

        footer a:active {
            opacity: 0.8;
        }

        /* === Animations === */
        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === Responsive === */
        @media (max-width: 768px) {
            :root {
                --space-xl: 80px;
                --space-2xl: 100px;
            }

            .hero-title {
                font-size: 2.4rem;
            }

            .education-item,
            .experience-item {
                grid-template-columns: 1fr;
                gap: 6px;
            }

            .section-header {
                flex-direction: column;
                gap: 12px;
            }

            .section-line {
                width: 60px;
                height: 1px;
            }

            .project-item::before {
                display: none;
            }

            .skills-grid {
                grid-template-columns: 1fr;
            }

            .edu-header {
                flex-direction: column;
                gap: 4px;
            }
        }

        /* === Smooth Scroll === */
        html {
            scroll-behavior: smooth;
        }
    </style>

    <!-- Override Render Functions FIRST - before render.js loads -->
    <script>
        // Custom render functions - defined BEFORE render.js runs
        // Education render - Card Style
        window.renderEducation = function(targetId, entries) {
            const target = document.getElementById(targetId);
            if (!target) return;
            if (!entries || entries.length === 0) {
                target.innerHTML = '<div class="placeholder">教育经历更新中...</div>';
                return;
            }
            target.innerHTML = entries.map(entry => `
                <div class="education-item">
                    <div class="edu-header">
                        <span class="edu-period">${entry.period}</span>
                    </div>
                    <div class="edu-content">
                        <h3>${entry.institution}</h3>
                        <p>${entry.detail}</p>
                    </div>
                </div>
            `).join('');
        };

        // Projects render - Card Style (no link wrapper, separate button)
        window.renderProjects = function(targetId, entries) {
            const target = document.getElementById(targetId);
            if (!target) return;
            if (!entries || entries.length === 0) {
                target.innerHTML = '<div class="placeholder">项目作品更新中...</div>';
                return;
            }
            target.innerHTML = entries.map((entry, index) => `
                <div class="project-item" style="animation-delay: ${0.1 + index * 0.1}s">
                    <div class="project-header">
                        <span class="project-title">${entry.title}</span>
                        <a href="${entry.href || '#'}" target="_blank" rel="noopener noreferrer" class="project-link-btn">查看 →</a>
                    </div>
                    <p class="project-desc">${entry.description}</p>
                    <div class="project-tags">
                        ${(entry.meta || []).map(tag => `<span class="project-tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        };

        // Skills render - Tag Style
        window.renderSkills = function(targetId, entries) {
            const target = document.getElementById(targetId);
            if (!target) return;
            if (!entries || entries.length === 0) {
                target.innerHTML = '<div class="placeholder">技能专长更新中...</div>';
                return;
            }
            target.innerHTML = `
                <div class="skills-container">
                    ${entries.map(entry => `
                        <div class="skill-category">
                            <div class="skill-category-title">${entry.category}</div>
                            <div class="skill-tags">
                                ${Array.isArray(entry.items) ? entry.items.map(item => `<span class="skill-tag">${item}</span>`).join('') : entry.items}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        };

        // Experience render - Card Style
        window.renderExperience = function(targetId, entries) {
            const target = document.getElementById(targetId);
            if (!target) return;
            if (!entries || entries.length === 0) {
                target.innerHTML = '<div class="placeholder">工作经历更新中...</div>';
                return;
            }
            target.innerHTML = entries.map(entry => `
                <div class="experience-item">
                    <div class="exp-header">
                        <span class="exp-period">${entry.period || ''}</span>
                    </div>
                    <div class="exp-content">
                        <h3>${entry.title || entry.company}</h3>
                        <p>${entry.detail || entry.description}</p>
                    </div>
                </div>
            `).join('');
        };
    </script>

    <!-- Load render.js AFTER our functions are defined -->
    <script src="js/render.js"></script>
    <script src="js/lang-switcher.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanZiRong - Personal Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #111111;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border-color: #eaeaea;
            --placeholder-bg: #fcfcfc;
            --placeholder-border: #efefef;
            --font-serif: "Playfair Display", serif;
            --font-sans: "Inter", sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 24px;
        }

        nav {
            padding: 40px 0;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }

        nav.scrolled {
            border-bottom: 1px solid var(--border-color);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--text-primary);
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }

        .nav-link:hover {
            border-bottom-color: var(--text-tertiary);
        }

        .hero {
            padding: 110px 0 72px 0;
            animation: fade-in 0.9s ease-out;
        }

        .hero h1 {
            font-family: var(--font-serif);
            font-size: 3.2rem;
            font-weight: 600;
            line-height: 1.12;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
        }

        .hero p {
            max-width: 600px;
            font-size: 1.15rem;
            color: var(--text-secondary);
            font-weight: 300;
            margin-bottom: 34px;
        }

        .hero a {
            display: inline-block;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 1px solid var(--text-tertiary);
            transition: border-color 0.25s ease;
        }

        .hero a:hover {
            border-bottom-color: var(--text-primary);
        }

        .section-title {
            position: relative;
            margin-top: 88px;
            margin-bottom: 42px;
            font-family: var(--font-serif);
            font-size: 1.95rem;
            font-weight: 600;
        }

        .section-title::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -14px;
            width: 40px;
            height: 1px;
            background-color: var(--text-primary);
        }

        .list {
            display: flex;
            flex-direction: column;
        }

        .item {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 26px 0;
            border-bottom: 1px solid var(--border-color);
            text-decoration: none;
            color: inherit;
            transition: transform 0.25s ease;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item.link-item::before {
            content: "";
            position: absolute;
            left: -22px;
            top: 27px;
            height: 1px;
            width: 0;
            background-color: var(--text-primary);
            transition: width 0.25s ease;
        }

        .item.link-item:hover {
            transform: translateX(7px);
        }

        .item.link-item:hover::before {
            width: 14px;
        }

        .item-header {
            display: flex;
            align-items: baseline;
            gap: 14px;
        }

        .item-title {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .item-arrow {
            font-size: 0.78rem;
            color: var(--text-tertiary);
            opacity: 0;
            transform: translateX(-8px);
            transition: all 0.25s ease;
        }

        .item.link-item:hover .item-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .item-desc {
            color: var(--text-secondary);
            font-weight: 300;
        }

        .item-meta {
            display: flex;
            gap: 14px;
            color: var(--text-tertiary);
            font-size: 0.88rem;
        }

        .edu-item {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 18px;
        }

        .edu-period {
            color: var(--text-tertiary);
            font-size: 0.9rem;
        }

        .placeholder {
            margin-top: 6px;
            border: 1px dashed var(--placeholder-border);
            background: var(--placeholder-bg);
            border-radius: 8px;
            padding: 18px 16px;
            color: var(--text-tertiary);
            font-size: 0.92rem;
            font-weight: 300;
        }

        footer {
            margin-top: 116px;
            padding: 40px 0;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.88rem;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.35rem;
            }

            .edu-item {
                grid-template-columns: 1fr;
                gap: 7px;
            }

            .item.link-item::before {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav id="navbar">
            <div class="nav-content">
                <a href="#" class="logo">Zirong Pan.</a>
                <a class="nav-link" href="https://github.com/TeabagCollector" target="_blank" rel="noopener noreferrer">GitHub</a>
            </div>
        </nav>

        <header class="hero">
            <h1>Designing with Clarity.</h1>
            <h1>Working with Passion.</h1>
            <p>我是潘籽荣（Zirong Pan）。欢迎访问我的个人界面。</p>
            <a href="#projects">查看关于我的 ↓</a>
        </header>

        <section id="education-section">
            <h2 class="section-title">Education</h2>
            <div id="education-list" class="list"></div>
        </section>

        <section id="projects">
            <h2 class="section-title">Selected Work</h2>
            <div id="projects-list" class="list"></div>
        </section>

        <section id="skills-section">
            <h2 class="section-title">Capabilities</h2>
            <div id="skills-list" class="list"></div>
        </section>

        <section id="experience-section">
            <h2 class="section-title">Experience</h2>
            <div id="experience-list" class="list"></div>
        </section>

        <footer>
            <p>© 2026 PanZiRong. Designed with clarity.</p>
        </footer>
    </div>

    <!-- 内容层：按顺序加载，render.js 依赖这些全局变量 -->
    <script src="content/education.js"></script>
    <script src="content/projects.js"></script>
    <script src="content/skills.js"></script>
    <script src="content/experience.js"></script>
    <script src="js/render.js"></script>
</body>
</html>
